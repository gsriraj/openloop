name: Security Audit

on:
  schedule:
    - cron: "0 0 * * 0"
  push:
    paths: ["Cargo.lock"]
  pull_request:
    paths: ["Cargo.lock"]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo install cargo-audit
      - run: cargo audit