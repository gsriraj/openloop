name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
            pkg: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
            pkg: tar.gz
          - target: x86_64-apple-darwin
            os: macos-13
            ext: ""
            pkg: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ""
            pkg: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
            pkg: zip

    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.pkg == 'tar.gz'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf "openloop-${{ matrix.target }}.tar.gz" "openloop${{ matrix.ext }}"

      - name: Package (Windows)
        if: matrix.pkg == 'zip'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a "openloop-${{ matrix.target }}.zip" "openloop${{ matrix.ext }}"

      - name: Checksum
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          sha256sum "openloop-${{ matrix.target }}.${{ matrix.pkg }}" \
            > "openloop-${{ matrix.target }}.${{ matrix.pkg }}.sha256"

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ matrix.target }}/release/openloop-${{ matrix.target }}.${{ matrix.pkg }}
            target/${{ matrix.target }}/release/openloop-${{ matrix.target }}.${{ matrix.pkg }}.sha256

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}