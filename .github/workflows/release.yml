name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Release ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf openloop-${{ matrix.target }}.tar.gz openloop
          shasum -a 256 openloop-${{ matrix.target }}.tar.gz > openloop-${{ matrix.target }}.tar.gz.sha256

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ matrix.target }}/release/openloop-${{ matrix.target }}.tar.gz
            target/${{ matrix.target }}/release/openloop-${{ matrix.target }}.tar.gz.sha256